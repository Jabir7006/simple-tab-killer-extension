<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab Sleeping...</title>
    <link rel="stylesheet" href="sleep.css">
</head>
<body>
    <div class="container">
        <div class="icon-container">
            <img id="favicon" src="icons/icon128.png" alt="Favicon" style="display: none;">
            <div id="sleep-icon">💤</div>
        </div>
        <h1 id="title">This tab is sleeping</h1>
        <p>This tab has been suspended to save memory and CPU.</p>
        <div class="url-display" id="url"></div>
        <button id="wake-btn">Wake Up</button>

    </div>
    <script src="sleep.js"></script>
</body>
</html>
